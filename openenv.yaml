spec_version: 1
name: video_encode
type: space
runtime: fastapi
app: server.app:app
port: 8000


tasks:
  - id: task_easy
    difficulty: easy
    max_steps: 10
    grader:
      type: llm
      prompt_template: "Score this response 0.0 to 1.0 based on accuracy..."

  - id: task_medium
    difficulty: medium
    max_steps: 15
    grader:
      type: llm
      prompt_template: "Score this response 0.0 to 1.0 based on..."

  - id: task_hard
    difficulty: hard
    max_steps: 20
    grader:
      type: llm
      prompt_template: "Score this response 0.0 to 1.0 based on..."

